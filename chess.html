<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Cole Guidrey's chess statistics">
  <title>Chess — Cole Guidrey</title>
  <link href="style.css" rel="stylesheet" type="text/css" />
</head>
<body>
  <div id="nav-placeholder"></div>

  <div class="chess-card">
    <div class="chess-card-header">
      <div class="chess-card-left">
        <span class="chess-rating-num" id="rapid-rating">—</span>
        <span class="chess-rating-label">Rapid ELO</span>
        <span id="rating-tier" class="chess-tier-badge"></span>
      </div>
      <a href="https://www.chess.com/member/coleguidrey" target="_blank" rel="noopener" class="chess-profile-link">@coleguidrey ↗</a>
    </div>
    <div id="rating-meter" style="display:none">
      <div class="meter-bar-wrapper">
        <div class="meter-marker" id="meter-marker">
          <div class="meter-marker-label" id="meter-marker-label"></div>
          <div class="meter-marker-line"></div>
        </div>
      </div>
      <div class="meter-ticks">
        <span style="left:0%">400</span>
        <span style="left:20%">800</span>
        <span style="left:40%">1200</span>
        <span style="left:60%">1600</span>
        <span style="left:80%">2000</span>
        <span style="left:100%">2400</span>
      </div>
      <div class="meter-tiers">
        <span style="left:0%;width:30%">Gentleman</span>
        <span style="left:30%;width:70%">Wasted Life</span>
      </div>
    </div>
  </div>
  <p class="small muted">"The ability to play chess is the sign of a gentleman. The ability to play chess well is the sign of a wasted life." — Paul Morphy</p>

  <div id="contact-placeholder"></div>
  <script src="script.js"></script>
</body>
</html>
