<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Cole Guidrey's Resume">
  <title>Resume - Cole Guidrey</title>
  <link href="style.css" rel="stylesheet" type="text/css" />
  <style>
    .resume-actions {
      display: flex;
      align-items: center;
      gap: var(--spacing-md);
      margin-bottom: var(--spacing-lg);
    }

    .btn-download {
      display: inline-block;
      background-color: var(--accent-color);
      color: #ffffff;
      padding: var(--spacing-xs) var(--spacing-md);
      border-radius: 6px;
      font-size: 0.95rem;
      font-weight: 500;
      text-decoration: none;
      transition: background-color 0.2s ease;
    }

    .btn-download:hover {
      background-color: var(--link-hover);
      color: #ffffff;
      text-decoration: none;
    }

    .pdf-container {
      border: 1px solid var(--border-color);
      border-radius: 8px;
      overflow: hidden;
      background-color: var(--secondary-bg);
    }

    .pdf-embed {
      width: 100%;
      height: 80vh;
      min-height: 600px;
      display: block;
    }

    .pdf-fallback {
      padding: var(--spacing-xl);
      text-align: center;
    }
  </style>
</head>
<body>
  <header>
    <h1>Cole Guidrey</h1>
  </header>

  <div class="container">
    <nav>
      <ol>
        <li><a href="index.html">home</a></li>
        <li><a href="about.html">about</a></li>
        <li><a href="writings.html">writings</a></li>
        <li><a href="portfolio.html">portfolio</a></li>
        <li><a href="chess.html">chess</a></li>
        <li><a href="resume.html" class="active">resume</a></li>
      </ol>
    </nav>

    <main>
      <h2>Resume</h2>

      <div class="resume-actions">
        <a href="Cole%20Guidrey's%20Resume.pdf" download="Cole Guidrey Resume.pdf" class="btn-download">Download PDF</a>
      </div>

      <div class="pdf-container">
        <object
          data="Cole%20Guidrey's%20Resume.pdf"
          type="application/pdf"
          class="pdf-embed"
        >
          <div class="pdf-fallback">
            <p>Your browser does not support embedded PDFs.</p>
            <p><a href="Cole%20Guidrey's%20Resume.pdf" download="Cole Guidrey Resume.pdf">Download the resume</a> to view it.</p>
          </div>
        </object>
      </div>
    </main>
  </div>

  <script src="script.js"></script>
</body>
</html>
